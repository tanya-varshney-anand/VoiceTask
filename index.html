<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VoiceTask — Jumbled thoughts, organized in seconds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --ink:#171B33; --ink-soft:#4E5578;
    --accent:#5B3DF5; --accent-deep:#3B1FD0;
    --amber:#92400E; --green:#065F46; --red:#B91C1C;
    --glass:rgba(255,255,255,0.48); --glass-strong:rgba(255,255,255,0.62);
    --glass-line:rgba(255,255,255,0.65); --radius:20px;
  }
  *{box-sizing:border-box; margin:0;}
  html{min-height:100%;}
  body{color:var(--ink); font-family:'Space Grotesk',system-ui,sans-serif; line-height:1.5; min-height:100vh;
    background:#E9ECFB;
    background-image:
      radial-gradient(46vw 46vw at 12% 8%,  rgba(91,61,245,.36), transparent 62%),
      radial-gradient(42vw 42vw at 88% 18%, rgba(56,189,248,.34), transparent 62%),
      radial-gradient(48vw 48vw at 78% 88%, rgba(244,114,182,.30), transparent 62%),
      radial-gradient(40vw 40vw at 15% 85%, rgba(52,211,153,.26), transparent 62%);
    background-attachment:fixed;}
  .wrap{max-width:720px; margin:0 auto; padding:40px 20px 80px;}
  h1{font-family:'Space Grotesk',sans-serif; font-size:clamp(30px,5vw,42px); letter-spacing:-0.02em;
    text-shadow:0 1px 0 rgba(255,255,255,.6);}
  h1 .dot{color:var(--accent);}
  .sub{color:var(--ink); margin-top:4px; font-size:17px; font-weight:600;}
  .helper{color:var(--ink-soft); margin-top:6px; font-size:12.5px; max-width:560px; font-style:italic;}
  .card{background:var(--glass); border:1px solid var(--glass-line); border-radius:var(--radius);
    padding:20px; margin-top:20px;
    backdrop-filter:blur(22px) saturate(160%); -webkit-backdrop-filter:blur(22px) saturate(160%);
    box-shadow:0 8px 32px rgba(23,27,51,.10), inset 0 1px 0 rgba(255,255,255,.7);}
  .mic-row{display:flex; flex-direction:column; align-items:center; gap:12px; padding:28px 20px;}
  .mic-btn{position:relative; width:96px; height:96px; border-radius:50%; cursor:pointer; color:#fff;
    border:1px solid rgba(255,255,255,.55);
    background:linear-gradient(135deg, rgba(91,61,245,.92), rgba(59,31,208,.92));
    box-shadow:0 10px 28px rgba(91,61,245,.40), inset 0 1px 0 rgba(255,255,255,.45);
    display:flex; align-items:center; justify-content:center; transition:transform .15s ease, background .2s;}
  .mic-btn:hover{transform:scale(1.05);}
  .mic-btn:focus-visible{outline:3px solid var(--ink); outline-offset:3px;}
  .mic-btn.listening{background:linear-gradient(135deg, rgba(239,68,68,.94), rgba(185,28,28,.94));
    box-shadow:0 10px 28px rgba(239,68,68,.42), inset 0 1px 0 rgba(255,255,255,.4);}
  .ring{position:absolute; inset:0; border-radius:50%; border:2px solid rgba(239,68,68,.8); opacity:0; pointer-events:none;}
  .listening .ring{animation:pulse 1.6s ease-out infinite;}
  .listening .ring:nth-child(2){animation-delay:.8s;}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.9);opacity:0}}
  @media (prefers-reduced-motion: reduce){ .listening .ring{animation:none;} }
  .mic-label{font-family:'Space Grotesk',sans-serif; font-weight:500;}
  .hint{font-size:13px; color:var(--ink-soft); text-align:center;}
  textarea{width:100%; min-height:96px; border:1px solid var(--glass-line); border-radius:14px; padding:12px 14px;
    font:14px/1.5 'Space Grotesk',sans-serif; color:var(--ink); resize:vertical;
    background:rgba(255,255,255,.55);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);}
  textarea::placeholder{color:#7A81A6; font-size:12.5px;}
  textarea:focus{outline:2px solid var(--accent); border-color:transparent; background:rgba(255,255,255,.75);}
  label{font-size:13px; font-weight:600; color:var(--ink-soft); display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em;}
  .btn{border:none; border-radius:14px; padding:13px 20px; font:600 15px 'Space Grotesk',sans-serif; cursor:pointer; transition:opacity .15s, transform .1s;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .btn-primary{width:100%; margin-top:12px; color:#fff;
    background:linear-gradient(135deg, rgba(31,36,68,.95), rgba(23,27,51,.95));
    border:1px solid rgba(255,255,255,.25);
    box-shadow:0 8px 20px rgba(23,27,51,.28), inset 0 1px 0 rgba(255,255,255,.18);}
  .btn-primary:hover:not(:disabled){opacity:.92; transform:translateY(-1px);}
  .status{margin-top:12px; font-size:14px; min-height:20px; font-weight:500;}
  .status.err{color:var(--red);} .status.ok{color:var(--green);} .status.busy{color:var(--accent-deep);}
  .group-title{font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:700; letter-spacing:.02em;
    margin:22px 0 8px; padding-bottom:6px; border-bottom:1px solid rgba(91,61,245,.35); display:flex; justify-content:space-between;}
  .group-title .count{color:var(--ink-soft); font-family:'Space Grotesk'; font-weight:500; font-size:13px;}
  .task{padding:12px 6px; border-bottom:1px solid rgba(255,255,255,.55); border-radius:10px;}
  .task:hover{background:rgba(255,255,255,.30);}
  .task:last-child{border-bottom:none;}
  .task-main{display:flex; align-items:flex-start; gap:12px;}
  .task.done .t-title{text-decoration:line-through; color:var(--ink-soft);}
  .t-body{flex:1; min-width:0;}
  .t-title{font-weight:500; font-size:15px;}
  .chips{display:flex; gap:6px; flex-wrap:wrap; margin-top:5px; align-items:center;}
  .chip{font-size:11.5px; font-weight:600; padding:3px 10px; border-radius:99px;
    border:1px solid rgba(255,255,255,.6);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);}
  .chip.cat{background:rgba(91,61,245,.16); color:var(--accent-deep);}
  .chip.p-High{background:rgba(239,68,68,.18); color:var(--red);}
  .chip.p-Medium{background:rgba(245,158,11,.20); color:var(--amber);}
  .chip.p-Low{background:rgba(16,185,129,.18); color:var(--green);}
  .chip.due{background:rgba(255,255,255,.45); color:var(--ink-soft);}
  .chip.p-High,.chip.p-Medium,.chip.p-Low{cursor:pointer; user-select:none;}
  .chip.p-High:hover,.chip.p-Medium:hover,.chip.p-Low:hover{filter:brightness(0.94);}
  .cat-select{font:600 11.5px 'Space Grotesk',sans-serif; color:var(--accent-deep); padding:3px 6px; border-radius:99px;
    border:1px solid rgba(255,255,255,.6); background:rgba(91,61,245,.16); cursor:pointer;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);}
  .cat-select:hover{background:rgba(91,61,245,.24);}
  .move-select{font:600 11.5px 'Space Grotesk',sans-serif; color:var(--ink-soft); padding:3px 6px; border-radius:99px;
    border:1px solid rgba(255,255,255,.6); background:rgba(255,255,255,.45); cursor:pointer;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);}
  .move-select:hover{background:rgba(255,255,255,.7); color:var(--ink);}
  .date-input{font:600 11.5px 'Space Grotesk',sans-serif; color:var(--ink-soft); padding:2px 8px; border-radius:99px;
    border:1px solid rgba(255,255,255,.6); background:rgba(255,255,255,.45); cursor:pointer;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);}
  .date-input:hover{background:rgba(255,255,255,.7); color:var(--ink);}
  .t-actions{display:flex; gap:6px; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end;}
  .icon-btn{border:1px solid var(--glass-line); background:rgba(255,255,255,.5); border-radius:10px;
    padding:6px 10px; font-size:12.5px; font-weight:600; cursor:pointer; color:var(--ink-soft);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); text-decoration:none; display:inline-flex; align-items:center;}
  .icon-btn:hover{background:rgba(255,255,255,.75); color:var(--ink);}
  .icon-btn.danger:hover{color:var(--red); border-color:rgba(239,68,68,.5);}
  .icon-btn.cal{color:var(--accent-deep); border-color:rgba(91,61,245,.45);}
  .icon-btn.cal:hover{background:rgba(91,61,245,.14);}
  .edit-panel{margin-top:10px; padding:12px; border-radius:14px; border:1px solid rgba(91,61,245,.35);
    background:rgba(255,255,255,.5);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);}
  .edit-panel input{width:100%; border:1px solid var(--glass-line); border-radius:10px; padding:9px 12px;
    font:13.5px 'Space Grotesk',sans-serif; color:var(--ink); background:rgba(255,255,255,.7);}
  .edit-panel input:focus{outline:2px solid var(--accent); border-color:transparent;}
  .edit-row{display:flex; gap:8px; margin-top:8px;}
  .mini-btn{border:none; border-radius:10px; padding:8px 14px; font:600 12.5px 'Space Grotesk',sans-serif; cursor:pointer;}
  .mini-btn.go{color:#fff; background:linear-gradient(135deg, rgba(91,61,245,.95), rgba(59,31,208,.95));}
  .mini-btn.go:disabled{opacity:.5; cursor:not-allowed;}
  .mini-btn.cancel{background:rgba(255,255,255,.6); color:var(--ink-soft); border:1px solid var(--glass-line);}
  .edit-status{font-size:12.5px; margin-top:6px; font-weight:500;}
  .edit-status.err{color:var(--red);} .edit-status.busy{color:var(--accent-deep);}
  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-top:24px;}
  .toolbar h2{font-family:'Space Grotesk',sans-serif; font-size:20px; text-shadow:0 1px 0 rgba(255,255,255,.5);}
  .clear{background:none; border:none; color:var(--red); font:600 13px 'Space Grotesk'; cursor:pointer;}
  .empty{color:var(--ink-soft); font-size:12.5px; padding:18px 4px;}
  .tasks-hint{color:var(--ink-soft); font-size:13px; margin-top:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const TIMELINES = ["Today","Tomorrow","This Week","Later"];
const CATS = ["Work","Personal","Shopping","Health","Finance","Follow-up","Other"];
// Old saved tasks (and the AI) may use category names as groups - map those to a timeline.
const normTimeline = g => TIMELINES.includes(g) ? g : "Later";
const load = (k, fb) => { try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch { return fb; } };

// Cycle priority High -> Medium -> Low -> High
const PRIOS = ["High","Medium","Low"];
const nextPrio = p => PRIOS[(PRIOS.indexOf(p) + 1) % PRIOS.length];

// Turn a task's group/timing into a real YYYYMMDD date for the calendar link.
function dueDateStr(group){
  const d = new Date();
  if (group === "Tomorrow") d.setDate(d.getDate() + 1);
  else if (group === "This Week") d.setDate(d.getDate() + 3);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}${m}${day}`;
}
// Build an "add to Google Calendar" URL (all-day event on the due date).
function calendarUrl(task){
  // If the user picked a specific date for a "Later" task, use it.
  const start = (task.group === "Later" && task.laterDate)
    ? task.laterDate.replace(/-/g, "")
    : dueDateStr(task.group);
  const endD = new Date(
    +start.slice(0,4), +start.slice(4,6) - 1, +start.slice(6,8) + 1
  );
  const end = `${endD.getFullYear()}${String(endD.getMonth()+1).padStart(2,"0")}${String(endD.getDate()).padStart(2,"0")}`;
  const details = `Priority: ${task.priority}` + (task.due ? ` · ${task.due}` : "");
  const p = new URLSearchParams({
    action: "TEMPLATE",
    text: task.title,
    dates: `${start}/${end}`,
    details
  });
  return "https://calendar.google.com/calendar/render?" + p.toString();
}

function MicIcon(){ return (
  <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
    <rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4M8 21h8"/>
  </svg>);}

function App(){
  const [text, setText] = useState(() => load("vt_text",""));
  const [tasks, setTasks] = useState(() =>
    load("vt_tasks",[]).map(t => ({...t, group: normTimeline(t.group),
      category: CATS.includes(t.category) ? t.category : (CATS.includes(t.group) ? t.group : "Other")})));
  const [status, setStatus] = useState({msg:"", kind:""});
  const [listening, setListening] = useState(false);
  const [busy, setBusy] = useState(false);
  // Which task is being edited: {id, note, busy, err}
  const [edit, setEdit] = useState(null);
  const recRef = useRef(null);
  const baseRef = useRef("");

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const voiceOK = !!SR;

  useEffect(() => localStorage.setItem("vt_text", JSON.stringify(text)), [text]);
  useEffect(() => localStorage.setItem("vt_tasks", JSON.stringify(tasks)), [tasks]);

  function toggleMic(){
    if (listening){ recRef.current?.stop(); return; }
    const rec = new SR();
    rec.lang = "en-IN"; rec.continuous = true; rec.interimResults = true;
    baseRef.current = text ? text.trim() + " " : "";
    rec.onresult = (e) => {
      let heard = "";
      for (const r of e.results) heard += r[0].transcript;
      setText(baseRef.current + heard);
    };
    rec.onstart = () => { setListening(true); setStatus({msg:"Listening… speak naturally, tap again to stop.", kind:"busy"}); };
    rec.onerror = (e) => setStatus({msg: e.error === "not-allowed"
      ? "Microphone blocked. Allow mic access in the address bar, or type your note below."
      : "Voice input hit a snag (" + e.error + "). You can type your note below.", kind:"err"});
    rec.onend = () => { setListening(false); setStatus(s => s.kind==="err" ? s : {msg:"Voice captured. Edit the note if needed, then organize.", kind:"ok"}); };
    recRef.current = rec; rec.start();
  }

  // Shared caller for the backend.
  async function askAI(noteText){
    const res = await fetch("/api/organize", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ text: noteText })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Request failed");
    return data.tasks || [];
  }

  async function organize(){
    if (!text.trim()){ setStatus({msg:"Nothing to organize yet — record or type a note first.", kind:"err"}); return; }
    setBusy(true); setStatus({msg:"Processing with AI…", kind:"busy"});
    try{
      const raw = await askAI(text);
      const fresh = raw.map((t,i) => ({
        id: Date.now() + "-" + i,
        title: t.title || "Untitled task",
        category: CATS.includes(t.category) ? t.category : (CATS.includes(t.group) ? t.group : "Other"),
        priority: PRIOS.includes(t.priority) ? t.priority : "Medium",
        due: t.due || "",
        group: normTimeline(t.group),
        done: false
      }));
      if (!fresh.length){ setStatus({msg:"No actionable tasks found in that note. Try adding a bit more detail.", kind:"err"}); }
      else {
        setTasks(prev => [...prev, ...fresh]);
        setStatus({msg:`Tasks generated — ${fresh.length} added.`, kind:"ok"});
        setText("");
      }
    } catch(err){
      setStatus({msg:"Couldn't organize tasks: " + err.message + " Your note is still saved above — try again.", kind:"err"});
    } finally { setBusy(false); }
  }

  // AI-refine one task using the user's note.
  async function refineTask(){
    const t = tasks.find(x => x.id === edit.id);
    if (!t || !edit.note.trim()) return;
    setEdit(e => ({...e, busy:true, err:""}));
    try{
      const prompt =
        `Existing task: "${t.title}" (category: ${t.category}, priority: ${t.priority}` +
        (t.due ? `, due: ${t.due}` : "") + `, group: ${t.group}). ` +
        `Apply this change and return exactly one updated task: ${edit.note}`;
      const out = await askAI(prompt);
      const u = out[0];
      if (!u) throw new Error("AI couldn't refine this task. Try rephrasing the note.");
      setTasks(ts => ts.map(x => x.id === t.id ? {
        ...x,
        title: u.title || x.title,
        category: CATS.includes(u.category) ? u.category : x.category,
        priority: PRIOS.includes(u.priority) ? u.priority : x.priority,
        due: (u.due !== undefined) ? u.due : x.due,
        group: TIMELINES.includes(u.group) ? u.group : x.group
      } : x));
      setEdit(null);
    } catch(err){
      setEdit(e => ({...e, busy:false, err: err.message}));
    }
  }

  const toggleDone = id => setTasks(ts => ts.map(t => t.id===id ? {...t, done:!t.done} : t));
  const cyclePrio = id => setTasks(ts => ts.map(t => t.id===id ? {...t, priority: nextPrio(t.priority)} : t));
  const moveGroup = (id, g) => setTasks(ts => ts.map(t => t.id===id ? {...t, group:g} : t));
  const setCategory = (id, c) => setTasks(ts => ts.map(t => t.id===id ? {...t, category:c} : t));
  const setLaterDate = (id, d) => setTasks(ts => ts.map(t => t.id===id ? {...t, laterDate:d} : t));
  const remove = id => { setTasks(ts => ts.filter(t => t.id!==id)); if (edit && edit.id===id) setEdit(null); };
  const clearAll = () => { if (confirm("Clear all tasks?")) { setTasks([]); setEdit(null); } };

  const groups = TIMELINES.filter(g => tasks.some(t => t.group===g));

  return (
    <div className="wrap">
      <h1>VoiceTask<span className="dot">.</span></h1>
      <p className="sub">Jumbled thoughts, organized in seconds.</p>
      <p className="helper">Tap to speak, review the transcript, and let VoiceTask turn scattered thoughts into a clean to-do list.</p>

      <div className="card mic-row">
        <button className={"mic-btn" + (listening ? " listening" : "")} onClick={toggleMic}
          disabled={!voiceOK} aria-label={listening ? "Stop recording" : "Start recording"}>
          <span className="ring"></span><span className="ring"></span><MicIcon/>
        </button>
        <div className="mic-label">{listening ? "Recording — tap to stop" : "Tap to speak"}</div>
        <div className="hint">{voiceOK
          ? "Works best in Chrome or Edge. Or just type your note below."
          : "Voice isn't supported in this browser — type your note below instead."}</div>
      </div>

      <div className="card">
        <label htmlFor="note">Spoken words appear here. Edit freely before organizing.</label>
        <textarea id="note" value={text} onChange={e => setText(e.target.value)}
          placeholder={'e.g. \u201CSend email to client today, follow up with Finance tomorrow, book dentist next week, and order groceries.\u201D'}/>
        <button className="btn btn-primary" onClick={organize} disabled={busy}>
          {busy ? "Processing…" : "Organize Tasks"}
        </button>
        <div className={"status " + status.kind} role="status">{status.msg}</div>
      </div>

      <div className="toolbar">
        <h2>Your tasks</h2>
        {tasks.length > 0 && <button className="clear" onClick={clearAll}>Clear all</button>}
      </div>
      <p className="tasks-hint">Once added, tasks can be tracked, marked by priority, added to your calendar, and sorted into lists — tap any chip or button on a task to try it.</p>

      <div className="card">
        {tasks.length === 0 && <div className="empty">No tasks yet. Record or type a note, then press “Organize Tasks”.</div>}
        {groups.map(g => (
          <div key={g}>
            <div className="group-title">{g}<span className="count">{tasks.filter(t=>t.group===g).length}</span></div>
            {tasks.filter(t => t.group===g).map(t => (
              <div key={t.id} className={"task" + (t.done ? " done" : "")}>
                <div className="task-main">
                  <div className="t-body">
                    <div className="t-title">{t.title}</div>
                    <div className="chips">
                      <select className="cat-select" value={t.category}
                        onChange={e => setCategory(t.id, e.target.value)}
                        title="Change category">
                        {CATS.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                      </select>
                      <span className={"chip p-" + t.priority} onClick={() => cyclePrio(t.id)}
                        title="Tap to change priority">{t.priority} ▾</span>
                      {t.due && <span className="chip due">{t.due}</span>}
                      <select className="move-select" value={t.group}
                        onChange={e => moveGroup(t.id, e.target.value)}
                        title="Change timeline">
                        {TIMELINES.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                      </select>
                      {t.group === "Later" &&
                        <input type="date" className="date-input" value={t.laterDate || ""}
                          onChange={e => setLaterDate(t.id, e.target.value)}
                          title="Pick a date (used for the calendar button)"/>}
                    </div>
                  </div>
                  <div className="t-actions">
                    <a className="icon-btn cal" href={calendarUrl(t)} target="_blank" rel="noopener"
                      title="Add to Google Calendar">📅</a>
                    <button className="icon-btn"
                      onClick={() => setEdit(edit && edit.id===t.id ? null : {id:t.id, note:"", busy:false, err:""})}>
                      Edit</button>
                    <button className="icon-btn" onClick={() => toggleDone(t.id)}>{t.done ? "Undo" : "Done"}</button>
                    <button className="icon-btn danger" onClick={() => remove(t.id)}>Delete</button>
                  </div>
                </div>
                {edit && edit.id === t.id && (
                  <div className="edit-panel">
                    <input value={edit.note} autoFocus
                      onChange={e => setEdit(x => ({...x, note:e.target.value}))}
                      onKeyDown={e => { if (e.key === "Enter" && !edit.busy) refineTask(); }}
                      placeholder={'Tell AI what to change — e.g. \u201Cmake this high priority\u201D, \u201Cdue Friday evening\u201D, \u201Crename to Call Rohan re: contract\u201D'}/>
                    <div className="edit-row">
                      <button className="mini-btn go" onClick={refineTask} disabled={edit.busy || !edit.note.trim()}>
                        {edit.busy ? "Refining…" : "Refine with AI"}
                      </button>
                      <button className="mini-btn cancel" onClick={() => setEdit(null)}>Cancel</button>
                    </div>
                    {edit.err && <div className="edit-status err">{edit.err}</div>}
                    {edit.busy && <div className="edit-status busy">Asking AI to update this task…</div>}
                  </div>
                )}
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
